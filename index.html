<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>HTML → createElement Converter</title>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px 20px;
            background: #111;
            font-size: 18px;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .editor-block {
            flex: 1;
            min-width: 0;
            /* КЛЮЧЕВОЕ */
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
        }

        .editor-title {
            margin-bottom: 5px;
        }

        .CodeMirror {
            flex: 1;
            height: 100%;
            border-radius: 6px;
        }

        /* Фиксируем ширину контента и включаем скролл */
        .CodeMirror-scroll {
            overflow: auto !important;
        }

        /* Чтобы длинные строки не переносились */
        .CodeMirror pre {
            white-space: pre;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            background: #007acc;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

    <header>Конвертер HTML → document.createElement()</header>

    <div class="container">
        <div class="editor-block">
            <div class="editor-title">HTML</div>
            <textarea id="htmlInput"><div class="box">
  <h1>Hello</h1>
  <p class="text">World</p>
</div></textarea>
        </div>

        <div class="editor-block">
            <div class="editor-title">JavaScript</div>
            <textarea id="jsOutput"></textarea>
            <button onclick="copyJS()">Скопировать JS</button>
        </div>
    </div>

    <script>
        const htmlEditor = CodeMirror.fromTextArea(document.getElementById("htmlInput"), {
            mode: "xml",
            theme: "default",
            lineNumbers: true
        });

        const jsEditor = CodeMirror.fromTextArea(document.getElementById("jsOutput"), {
            mode: "javascript",
            theme: "default",
            lineNumbers: true,
            readOnly: true
        });

        function convertNode(node, parentVar, counter) {
            let code = "";

            if (node.nodeType === Node.TEXT_NODE) {
                const text = node.textContent.trim();
                if (text) {
                    code += `${parentVar}.appendChild(document.createTextNode(${JSON.stringify(text)}));\n`;
                }
                return { code, counter };
            }

            if (node.nodeType !== Node.ELEMENT_NODE) {
                return { code, counter };
            }

            const varName = `el${counter++}`;
            code += `const ${varName} = document.createElement("${node.tagName.toLowerCase()}");\n`;

            for (let attr of node.attributes) {
                code += `${varName}.setAttribute("${attr.name}", "${attr.value}");\n`;
            }

            for (let child of node.childNodes) {
                const result = convertNode(child, varName, counter);
                code += result.code;
                counter = result.counter;
            }

            if (parentVar) {
                code += `${parentVar}.appendChild(${varName});\n`;
            }

            return { code, counter };
        }

        function convertHTMLtoJS(html) {
            const template = document.createElement("template");
            template.innerHTML = html.trim();

            const nodes = Array.from(template.content.childNodes)
                .filter(n =>
                    n.nodeType === Node.ELEMENT_NODE ||
                    (n.nodeType === Node.TEXT_NODE && n.textContent.trim())
                );

            let code = "";
            let counter = 0;

            // Если больше одного корневого узла — создаём fragment
            if (nodes.length > 1) {
                code += `const fragment = document.createDocumentFragment();\n\n`;

                for (let node of nodes) {
                    const result = convertNode(node, "fragment", counter);
                    code += result.code + "\n";
                    counter = result.counter;
                }

                return code;
            }

            // Если один корневой элемент — обычная логика
            if (nodes.length === 1) {
                const result = convertNode(nodes[0], null, counter);
                return result.code;
            }

            return "";
        }


        function updateConversion() {
            const html = htmlEditor.getValue();
            const jsCode = convertHTMLtoJS(html);
            jsEditor.setValue(jsCode);
        }

        function copyJS() {
            navigator.clipboard.writeText(jsEditor.getValue());
            alert("JS код скопирован!");
        }

        htmlEditor.on("change", updateConversion);

        // Первичная конвертация
        updateConversion();
    </script>

</body>

</html>
