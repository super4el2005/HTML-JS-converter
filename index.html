<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>HTML → JS Converter</title>

    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: #252526;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: #3a3d41;
            color: white;
        }

        button:hover {
            background: #4a4d52;
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .editor:last-child {
            border-right: none;
        }

        .editor-title {
            padding: 10px;
            background: #2d2d2d;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        .code-wrapper {
            flex: 1;
            overflow: auto;
            padding: 15px;
        }

        textarea {
            width: 100%;
            height: 50%;
            resize: none;
            background: #1e1e1e;
            color: white;
            border: none;
            outline: none;
            font-family: monospace;
            font-size: 14px;
            padding: 15px;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        pre {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <button onclick="convert()">Конвертировать</button>
        <button onclick="copyCode()">Скопировать JS</button>
    </header>

    <div class="container">

        <!-- HTML -->
        <div class="editor">
            <div class="editor-title">HTML (редактор)</div>
            <textarea id="htmlInput" placeholder="Вставьте HTML сюда..."></textarea>

            <div class="editor-title">HTML (подсветка)</div>
            <div class="code-wrapper">
                <pre><code id="htmlPreview" class="language-markup"></code></pre>
            </div>
        </div>

        <!-- JS -->
        <div class="editor">
            <div class="editor-title">JavaScript</div>
            <div class="code-wrapper">
                <pre><code id="jsOutput" class="language-javascript"></code></pre>
            </div>
        </div>

    </div>

    <script>
        const htmlInput = document.getElementById("htmlInput");
        const htmlPreview = document.getElementById("htmlPreview");
        const jsOutput = document.getElementById("jsOutput");

        htmlInput.addEventListener("input", () => {
            htmlPreview.textContent = htmlInput.value;
            Prism.highlightElement(htmlPreview);
        });

        function convert() {
            const html = htmlInput.value;
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            let counter = 0;
            let result = [];
            result.push("const page = document.createDocumentFragment();");

            function nextVar(prefix) {
                counter++;
                return prefix + counter;
            }

            function walk(node, parentVar) {

                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.textContent.trim();
                    if (!text) return;

                    const textVar = nextVar("text");
                    result.push(
                        `const ${textVar} = document.createTextNode(${JSON.stringify(text)});`
                    );
                    result.push(`${parentVar}.appendChild(${textVar});`);
                    return;
                }

                if (node.nodeType === Node.ELEMENT_NODE) {
                    const tag = node.tagName.toLowerCase();
                    const varName = nextVar(tag);

                    if (node.namespaceURI === "http://www.w3.org/2000/svg") {
                        result.push(
                            `const ${varName} = document.createElementNS("http://www.w3.org/2000/svg", "${tag}");`
                        );
                    } else {
                        result.push(`const ${varName} = document.createElement("${tag}");`);
                    }

                    for (let attr of node.attributes) {
                        result.push(
                            `${varName}.setAttribute(${JSON.stringify(attr.name)}, ${JSON.stringify(attr.value)});`
                        );

                    }

                    result.push(`${parentVar}.appendChild(${varName});`);

                    for (let child of node.childNodes) {
                        walk(child, varName);
                    }
                }
            }

            for (let child of doc.body.childNodes) {
                walk(child, "page");
            }

            const outputCode = result.join("\n");
            jsOutput.textContent = outputCode;
            Prism.highlightElement(jsOutput);
        }

        function copyCode() {
            navigator.clipboard.writeText(jsOutput.textContent).then(() => {
                alert("JS код скопирован!");
            });
        }
    </script>

</body>

</html>
